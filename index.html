<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camargo Tech & Design | Assessoria de Marketing</title>
    <style>
        /* --- NOVA IDENTIDADE VISUAL: CAMARGO TECH & DESIGN --- */
        :root {
            /* Paleta Principal */
            --cor-fundo-principal: #101527; /* Azul marinho profundo (Fundo do site) */
            --cor-texto-claro: #e6e6e6;     /* Cinza claro (Texto principal) */
            --cor-destaque: #83acbd;        /* Azul acinzentado (Botões, ícones, links, ROI) */
            --cor-fundo-secundario: #233652; /* Azul médio (Cards, seções alternadas) */
            
            /* Mantendo a fonte para consistência, mas a cor muda */
            --fonte-principal: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        
        body {
            font-family: var(--fonte-principal);
            background-color: var(--cor-fundo-principal); /* Fundo escuro */
            color: var(--cor-texto-claro); /* Texto claro */
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Títulos agora em cor clara ou destaque */
        h1, h2, h3 { color: var(--cor-texto-claro); font-weight: 700; margin-bottom: 0.8rem; }
        /* Subtítulos em tom de destaque para hierarquia */
        h3 { color: var(--cor-destaque); } 
        h4 { color: var(--cor-texto-claro); font-weight: 600; margin-bottom: 0.5rem; opacity: 0.9; }
        p { margin-bottom: 1rem; text-align: justify; }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        /* Imagens com leve brilho na borda para destacar no fundo escuro */
        img { max-width: 100%; height: auto; border-radius: 8px; display: block; border: 1px solid #233652; }
        
        .grid-2 { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 50px; 
            align-items: center; 
        }

        /* --- 1. CAPA (HERO) TECH --- */
        .hero-cover {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            /* Gradiente sutil no fundo escuro */
            background: linear-gradient(135deg, var(--cor-fundo-principal) 0%, var(--cor-fundo-secundario) 100%);
            position: relative;
        }
        
        .hero-title {
            font-size: 4rem;
            margin-bottom: 10px;
            animation: fadeIn 1.5s ease-in;
            font-weight: 800;
            color: var(--cor-texto-claro);
            text-transform: uppercase; /* Mais imponente */
            letter-spacing: 2px;
        }
        
        /* Destaque sutil em parte do nome se desejar, senão deixe tudo claro */
        .nome-tech { color: var(--cor-destaque); }
        
        .hero-subtitle {
            font-size: 1.2rem;
            color: var(--cor-destaque); /* Subtítulo na cor de destaque */
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .scroll-down {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite;
            color: var(--cor-destaque); /* Seta na cor de destaque */
            font-size: 2rem;
            cursor: pointer;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0) translateX(-50%);}
            40% {transform: translateY(-10px) translateX(-50%);}
            60% {transform: translateY(-5px) translateX(-50%);}
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 2. SOBRE MIM --- */
        .about-section { padding: 80px 20px; background-color: var(--cor-fundo-principal); }
        .about-img {
            width: 280px; height: 280px; object-fit: cover;
            /* Borda na cor de destaque */
            border-radius: 50%; border: 4px solid var(--cor-destaque);
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(131, 172, 189, 0.2); /* Glow sutil */
        }

        /* SEÇÕES GERAIS */
        section { padding: 80px 0; border-bottom: 1px solid var(--cor-fundo-secundario); }
        /* Fundo alternado agora é o azul médio */
        .bg-light { background-color: var(--cor-fundo-secundario); border-bottom: none; }
        
        /* Listas com visual de "Card" escuro */
        .card-list { list-style: none; }
        .card-list li {
            background: var(--cor-fundo-secundario); /* Fundo do item da lista */
            padding: 20px; margin-bottom: 15px;
            border-left: 4px solid var(--cor-destaque); /* Borda lateral de destaque */
            border-radius: 0 8px 8px 0;
        }

        /* --- SPRINTS (VISUAL TECH) --- */
        .sprints-container {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
        }
        .sprint-item {
            flex: 1;
            min-width: 200px;
